<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TravelBattle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:2.5rem;margin-bottom:8px">⚔️</div>
      <div class="logo-text">TravelBattle</div>
      <div class="logo-sub">Join the arena · Propose destinations · Win</div>
    </div>

    <div id="loginError" class="login-error"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          placeholder="alice or bob"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="password"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
        Enter Battle Room ✈️
      </button>
    </form>

    <div class="demo-users">
      <p>Demo accounts — click to fill:</p>
      <div class="demo-chips">
        <button class="demo-chip" onclick="fillDemo('alice')">👤 Alice</button>
        <button class="demo-chip" onclick="fillDemo('bob')">👤 Bob</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:20px">
      <a href="/" style="font-size:0.8rem;color:var(--gray-500)">← Back to homepage</a>
    </div>
  </div>
</div>

<script>
function fillDemo(username) {
  document.getElementById('username').value = username;
  document.getElementById('password').value = 'password';
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errBox = document.getElementById('loginError');

  errBox.style.display = 'none';
  btn.textContent = 'Logging in…';
  btn.disabled = true;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('tb_user', data.user);
      localStorage.setItem('tb_token', data.token);
      window.location.href = '/chat';
    } else {
      errBox.textContent = data.error || 'Login failed. Try alice / password';
      errBox.style.display = 'block';
      btn.textContent = 'Enter Battle Room ✈️';
      btn.disabled = false;
    }
  } catch (err) {
    errBox.textContent = 'Cannot connect to server. Is it running?';
    errBox.style.display = 'block';
    btn.textContent = 'Enter Battle Room ✈️';
    btn.disabled = false;
  }
}

// Redirect if already logged in
if (localStorage.getItem('tb_user') && localStorage.getItem('tb_token')) {
  window.location.href = '/chat';
}
</script>
</body>
</html>
